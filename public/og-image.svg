<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f8fafc"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,94,184,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#005EB8"/>

  <!-- Brand block -->
  <rect x="80" y="80" width="64" height="64" rx="16" fill="#005EB8"/>
  <text x="112" y="122" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle">E</text>

  <!-- Site name -->
  <text x="164" y="116" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#0f172a">E-file Reviews</text>

  <!-- Badge -->
  <rect x="164" y="126" width="168" height="28" rx="14" fill="#dbeafe"/>
  <text x="248" y="145" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#005EB8" text-anchor="middle">✓ Verified Partner</text>

  <!-- Main heading -->
  <text x="80" y="270" font-family="system-ui, sans-serif" font-size="52" font-weight="800" fill="#0f172a">Expert Clinical Equipment</text>
  <text x="80" y="335" font-family="system-ui, sans-serif" font-size="52" font-weight="800" fill="#005EB8">Reviews for UK Professionals</text>

  <!-- Subtext -->
  <text x="80" y="400" font-family="system-ui, sans-serif" font-size="24" fill="#475569">Torque safety · Vibration control · White finger prevention</text>

  <!-- Separator -->
  <rect x="80" y="450" width="1040" height="2" fill="#e2e8f0"/>

  <!-- Trust indicators -->
  <text x="80" y="500" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#005EB8">Technical Testing</text>
  <text x="80" y="524" font-family="system-ui, sans-serif" font-size="16" fill="#64748b">Torque &amp; vibration analysis</text>

  <text x="360" y="500" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#005EB8">Safety Certified</text>
  <text x="360" y="524" font-family="system-ui, sans-serif" font-size="16" fill="#64748b">NHS clinical standards</text>

  <text x="640" y="500" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#005EB8">Expert Reviews</text>
  <text x="640" y="524" font-family="system-ui, sans-serif" font-size="16" fill="#64748b">PhD-level clinical expertise</text>

  <text x="920" y="500" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#005EB8">UK Market</text>
  <text x="920" y="524" font-family="system-ui, sans-serif" font-size="16" fill="#64748b">Healthcare equipment trends</text>

  <!-- URL -->
  <text x="80" y="590" font-family="system-ui, sans-serif" font-size="18" fill="#94a3b8">efilereviews.co.uk</text>
</svg>
